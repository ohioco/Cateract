<!DOCTYPE html>
<html>
<head>
  <title>Cateract Browser</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    #bar {
      display: flex;
      padding: 10px;
      background: #1c1c1c;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      margin-left: 10px;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 60px);
      border: none;
      background: white;
    }
  </style>
</head>

<body>

<div id="bar">
  <input id="url" placeholder="cat://site/home">
  <button onclick="go()">Go</button>
</div>

<iframe id="frame"></iframe>

<script>
function go() {
  let input = document.getElementById("url").value.trim();
  if (!input) return;

  let path;

  if (input.startsWith("cat://")) {
    path = "/" + input.replace("cat://", "");
  } else {
    path = input;
  }

  document.getElementById("frame").src = path;
}
</script>

</body>
</html>
