<!DOCTYPE html>
<html>
<body style="margin:0;font-family:Arial;background:#0f0f0f;color:white;">

<div style="display:flex;background:#1c1c1c;padding:8px;">
  <input id="url" style="flex:1;padding:8px;" placeholder="cat://home">
  <button onclick="go()">Go</button>
</div>

<div id="view" style="padding:20px;"></div>

<div id="user" style="position:absolute;right:10px;top:60px;background:#222;padding:10px;"></div>

<script>

async function loadUser(){
  const r = await fetch("/api/me");
  const d = await r.json();

  document.getElementById("user").innerHTML =
    d.loggedIn ? d.user.email : "Guest";
}

async function go(){
  const url = document.getElementById("url").value;

  const r = await fetch("/api/cat?url=" + encodeURIComponent(url));
  const d = await r.json();

  document.getElementById("view").innerHTML = d.html;
}

loadUser();

</script>

</body>
</html>
